<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSPSS — Probably Significant Statistical Software</title>
  <style>
/* PSPSS — stats-software parody chrome. Beige, institutional, faintly hostile. */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  background: #6b7280;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  font-size: 13px;
  color: #1f2937;
}
#app {
  max-width: 1180px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #ece9e0;
  border-left: 1px solid #4b5563;
  border-right: 1px solid #4b5563;
}

/* Title bar */
.titlebar {
  background: linear-gradient(#3b6ea5, #2c5685);
  color: #fff;
  font-weight: 600;
  padding: 5px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: .2px;
}
.titlebar .winbtns { font-family: monospace; opacity: .85; letter-spacing: 3px; }
.titlebar small { font-weight: 400; opacity: .8; }

/* Menu bar */
.menubar {
  background: #f3f1ea;
  border-bottom: 1px solid #b7b2a3;
  display: flex;
  padding: 0 4px;
  position: relative;
  z-index: 30;
}
.menu { position: relative; }
.menu > .menu-label {
  padding: 5px 11px;
  cursor: default;
  user-select: none;
}
.menu.open > .menu-label,
.menu > .menu-label:hover { background: #d7e3f4; }
.dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 260px;
  background: #f7f6f1;
  border: 1px solid #9a958a;
  box-shadow: 2px 3px 8px rgba(0,0,0,.35);
  padding: 3px 0;
}
.menu.open .dropdown { display: block; }
.dropdown .item {
  padding: 5px 14px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  cursor: default;
  white-space: nowrap;
}
.dropdown .item:hover { background: #3b6ea5; color: #fff; }
.dropdown .item.disabled { color: #b0aa9c; pointer-events: none; }
.dropdown .item.danger { color: #b91c1c; }
.dropdown .item:hover.danger { background: #b91c1c; color: #fff; }
.dropdown .sep { height: 1px; background: #d8d3c6; margin: 3px 0; }
.dropdown .cost { font-size: 11px; opacity: .7; font-family: monospace; }
.dropdown .item:hover .cost { opacity: .95; }

/* Sub bar with level + mode */
.subbar {
  background: #e3dfd3;
  border-bottom: 1px solid #c4bfb1;
  padding: 5px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.level-info b { font-size: 14px; }
.level-info .rank { color: #6b6450; font-style: italic; }
.mode-pill {
  display: inline-flex;
  border: 1px solid #9a958a;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  font-size: 11px;
}
.mode-pill span { padding: 3px 10px; background: #f3f1ea; }
.mode-pill span.on { background: #3b6ea5; color: #fff; font-weight: 600; }

/* Stat strip */
.statstrip {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1.4fr;
  gap: 8px;
  padding: 8px 10px;
  background: #d9d4c6;
  border-bottom: 1px solid #c4bfb1;
}
.stat {
  background: #fbfaf6;
  border: 1px solid #c4bfb1;
  border-radius: 3px;
  padding: 6px 10px;
}
.stat .k { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #7a7460; }
.stat .v { font-size: 18px; font-weight: 700; font-family: "Consolas", monospace; margin-top: 2px; }
#stat-p { border: 2px solid #b91c1c; }
#stat-p.sig { border-color: #15803d; background: #ecfdf3; }
#stat-p.sig .v { color: #15803d; }
.susp-bar { height: 8px; background: #e5e1d4; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.susp-fill { height: 100%; width: 0; background: #f59e0b; transition: width .3s, background .3s; }

/* Main panes */
.main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #c4bfb1; overflow: hidden; }
.pane { background: #fff; display: flex; flex-direction: column; overflow: hidden; }
.pane-title {
  background: #e8e4d8;
  border-bottom: 1px solid #c4bfb1;
  padding: 4px 10px;
  font-weight: 600;
  font-size: 12px;
  color: #5b5440;
}
.pane-body { flex: 1; overflow: auto; }

/* Data grid */
table.grid { border-collapse: collapse; width: 100%; font-size: 12px; }
table.grid th, table.grid td {
  border: 1px solid #dcd8cb;
  padding: 2px 7px;
  text-align: right;
  font-family: "Consolas", monospace;
}
table.grid th {
  background: #eef1f6;
  position: sticky;
  top: 0;
  color: #33415c;
  font-family: "Segoe UI", sans-serif;
}
table.grid th.rownum, table.grid td.rownum { background: #f0ede4; color: #9a958a; text-align: center; }
table.grid td.group { text-align: center; font-weight: 600; }
table.grid td.cat { text-align: center; font-family: "Segoe UI", sans-serif; }
table.grid .activecol { background: #fff7e6; }
table.grid th.activecol { background: #ffe9b8; }
table.grid tr.dimmed td { color: #c2bcab; background: #fafaf7; }
table.grid tr.fab td { background: #fdecec; color: #b91c1c; }

/* Output pane (SPSS-ish) */
#output { padding: 10px 12px; font-size: 12px; }
.out-block { margin-bottom: 14px; }
.out-syntax { font-family: "Consolas", monospace; color: #1d4ed8; background: #f5f7ff; border-left: 3px solid #1d4ed8; padding: 3px 8px; margin-bottom: 4px; white-space: pre-wrap; }
.out-h { font-weight: 700; color: #111; border-bottom: 2px solid #111; display: inline-block; margin: 2px 0 4px; }
table.out { border-collapse: collapse; font-size: 12px; margin: 2px 0 4px; }
table.out th, table.out td { border: 1px solid #444; padding: 2px 9px; text-align: center; }
table.out th { background: #efeada; }
.out-p.sig { color: #15803d; font-weight: 700; }
.out-p.nsig { color: #b91c1c; font-weight: 700; }
.out-note { color: #6b6450; font-style: italic; margin: 2px 0; }
.out-rev { color: #7c2d12; background: #fff7ed; border: 1px dashed #fdba74; padding: 3px 8px; margin: 4px 0; border-radius: 3px; }
.out-flag { color: #b91c1c; font-weight: 600; }

/* Modals */
.modal-back {
  position: fixed; inset: 0; background: rgba(31,41,55,.72);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: #f7f6f1; border: 1px solid #4b5563; border-radius: 6px;
  max-width: 560px; width: 92%; box-shadow: 0 18px 50px rgba(0,0,0,.5);
  max-height: 90vh; overflow: auto;
}
.modal .bar { background: linear-gradient(#3b6ea5,#2c5685); color:#fff; padding: 7px 12px; font-weight:600; border-radius: 5px 5px 0 0; }
.modal .body { padding: 16px 18px; line-height: 1.5; }
.modal .body h2 { margin: 0 0 6px; }
.modal .hyp { background: #eef4fb; border-left: 3px solid #3b6ea5; padding: 8px 12px; margin: 10px 0; }
.modal .body .win { color: #15803d; }
.modal .body .bad { color: #b91c1c; }
.btnrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
button.btn {
  background: #3b6ea5; color: #fff; border: 1px solid #2c5685; border-radius: 4px;
  padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
}
button.btn:hover { background: #335f90; }
button.btn.ghost { background: #e8e4d8; color: #33415c; border-color: #c4bfb1; }
button.btn.danger { background: #b91c1c; border-color: #991b1b; }

/* Start screen / campaign map */
.start { padding: 22px 26px; overflow: auto; }
.start h1 { margin: 0; color: #2c5685; }
.start .tagline { color: #6b6450; margin: 2px 0 16px; }
.levelgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.levelcard {
  background: #fbfaf6; border: 1px solid #c4bfb1; border-radius: 5px; padding: 11px 13px; cursor: pointer;
}
.levelcard:hover { border-color: #3b6ea5; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.levelcard.locked { opacity: .5; cursor: not-allowed; }
.levelcard .lt { font-weight: 700; }
.levelcard .lr { font-size: 11px; color: #6b6450; font-style: italic; }
.levelcard .stars { color: #f59e0b; letter-spacing: 2px; margin-top: 4px; }
.levelcard .stars .empty { color: #d8d3c6; }
.clean-badge { font-size: 10px; background: #15803d; color: #fff; border-radius: 8px; padding: 1px 7px; margin-left: 6px; }
.hint { font-size: 12px; color: #6b6450; }
a.link { color: #2c5685; cursor: pointer; text-decoration: underline; }

/* HOUSE RULE banner (stricter thresholds) */
.house-rule { background: #fff7ed; border: 1px solid #fdba74; border-left: 4px solid #ea580c; border-radius: 4px; padding: 8px 12px; margin: 10px 0; color: #7c2d12; }

/* Debrief */
.dbf { margin: 8px 0; line-height: 1.5; }
.reveal { padding: 10px 12px; border-radius: 5px; margin: 10px 0; line-height: 1.5; }
.reveal.bad { background: #fdecec; border: 1px solid #f5a6a6; color: #7f1d1d; }
.reveal.warn { background: #fff7ed; border: 1px solid #fdba74; color: #7c2d12; }
.reveal.good { background: #ecfdf3; border: 1px solid #86efac; color: #14532d; }
.lesson { background: #f5f7ff; border: 1px solid #c7d2fe; border-radius: 5px; padding: 10px 12px; margin: 10px 0; line-height: 1.45; }
.lesson-h { font-weight: 700; color: #1e3a5f; margin-bottom: 4px; }
.lesson-harm { margin: 5px 0; }
.lesson-cite { font-size: 11px; color: #6b6450; margin-top: 6px; }
.vtag { font-size: 10px; border-radius: 8px; padding: 1px 7px; vertical-align: middle; }
.vtag.bad { background: #b91c1c; color: #fff; }
.vtag.ctx { background: #ca8a04; color: #fff; }
.vtag.ok { background: #15803d; color: #fff; }
.ach-pop { background: #fffbeb; border: 1px solid #fde68a; border-radius: 5px; padding: 8px 12px; margin: 10px 0; }

/* Codex */
.codex-card { background: #fbfaf6; border: 1px solid #c4bfb1; border-radius: 5px; padding: 10px 12px; margin: 8px 0; line-height: 1.45; }
.codex-card.focus { border-color: #3b6ea5; box-shadow: 0 0 0 2px rgba(59,110,165,.25); }

/* Dashboard */
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
.dash-stat { background: #fbfaf6; border: 1px solid #c4bfb1; border-radius: 5px; padding: 8px 10px; text-align: center; }
.dash-stat .k { font-size: 10px; text-transform: uppercase; color: #7a7460; }
.dash-stat .v { font-size: 18px; font-weight: 700; font-family: "Consolas", monospace; }
.ach-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.ach-item { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #f0ede4; color: #9a958a; }
.ach-item.got { background: #fffbeb; color: #1f2937; }

/* Quiz */
.quiz-scenario { background: #f3f1ea; border-left: 3px solid #3b6ea5; padding: 10px 12px; margin: 8px 0; font-style: italic; line-height: 1.5; }
.quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin: 6px 0; }
.quiz-opt { font-size: 12px; display: flex; align-items: center; gap: 5px; padding: 3px 6px; cursor: pointer; }

/* ---- Accessibility & polish ---- */
/* colour-independent status badge on the metric card */
.statusbadge { font-size: 11px; font-weight: 700; margin-top: 4px; display: inline-block; }
#stat-p .statusbadge { color: #b91c1c; }
#stat-p.sig .statusbadge { color: #15803d; }
/* visible keyboard focus everywhere */
:focus-visible { outline: 3px solid #2563eb; outline-offset: 1px; }
.menu-label:focus-visible, .item:focus-visible, .levelcard:focus-visible { outline: 3px solid #2563eb; outline-offset: -2px; }
/* sound toggle */
.snd-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer; }

/* responsive: stack panes and wrap bars on narrow screens / phones */
@media (max-width: 1000px) {
  #app { max-width: 100%; height: auto; min-height: 100vh; }
  .main { grid-template-columns: 1fr; }
  .statstrip { grid-template-columns: 1fr 1fr; }
  .menubar { flex-wrap: wrap; }
  .pane-body { max-height: 60vh; }
  .levelgrid { grid-template-columns: 1fr; }
  .dash-grid { grid-template-columns: 1fr 1fr; }
  .quiz-opts, .ach-list { grid-template-columns: 1fr; }
  button.btn { padding: 9px 14px; }
}

</style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <script>
// ===================== stats.js =====================
/*
 * PSPSS stats engine — genuine (lightweight) statistical tests.
 *
 * This is the load-bearing wall of the game: every puzzle's p-value comes from here.
 * If these are wrong, every level is silently broken. Hence src/stats.test.js.
 *
 * Works in Node (module.exports) and the browser (window.Stats).
 *
 * p-values returned are TWO-TAILED unless noted.
 */
(function (root) {
  'use strict';

  // ---- Special functions ---------------------------------------------------

  // Log-gamma (Lanczos approximation).
  function logGamma(x) {
    const c = [
      76.18009172947146, -86.50532032941677, 24.01409824083091,
      -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5,
    ];
    let y = x;
    let tmp = x + 5.5;
    tmp -= (x + 0.5) * Math.log(tmp);
    let ser = 1.000000000190015;
    for (let j = 0; j < 6; j++) {
      y++;
      ser += c[j] / y;
    }
    return -tmp + Math.log((2.5066282746310005 * ser) / x);
  }

  // Continued fraction for the incomplete beta function (Numerical Recipes).
  function betacf(a, b, x) {
    const MAXIT = 200;
    const EPS = 3e-12;
    const FPMIN = 1e-300;
    const qab = a + b;
    const qap = a + 1;
    const qam = a - 1;
    let c = 1;
    let d = 1 - (qab * x) / qap;
    if (Math.abs(d) < FPMIN) d = FPMIN;
    d = 1 / d;
    let h = d;
    for (let m = 1; m <= MAXIT; m++) {
      const m2 = 2 * m;
      let aa = (m * (b - m) * x) / ((qam + m2) * (a + m2));
      d = 1 + aa * d;
      if (Math.abs(d) < FPMIN) d = FPMIN;
      c = 1 + aa / c;
      if (Math.abs(c) < FPMIN) c = FPMIN;
      d = 1 / d;
      h *= d * c;
      aa = (-(a + m) * (qab + m) * x) / ((a + m2) * (qap + m2));
      d = 1 + aa * d;
      if (Math.abs(d) < FPMIN) d = FPMIN;
      c = 1 + aa / c;
      if (Math.abs(c) < FPMIN) c = FPMIN;
      d = 1 / d;
      const del = d * c;
      h *= del;
      if (Math.abs(del - 1) < EPS) break;
    }
    return h;
  }

  // Regularized incomplete beta function I_x(a, b).
  function betai(a, b, x) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    const bt = Math.exp(
      logGamma(a + b) - logGamma(a) - logGamma(b) +
        a * Math.log(x) + b * Math.log(1 - x)
    );
    if (x < (a + 1) / (a + b + 2)) {
      return (bt * betacf(a, b, x)) / a;
    }
    return 1 - (bt * betacf(b, a, 1 - x)) / b;
  }

  // Error function (Abramowitz & Stegun 7.1.26).
  function erf(x) {
    const sign = x >= 0 ? 1 : -1;
    const ax = Math.abs(x);
    const t = 1 / (1 + 0.3275911 * ax);
    const y =
      1 -
      ((((1.061405429 * t - 1.453152027) * t + 1.421413741) * t -
        0.284496736) *
        t +
        0.254829592) *
        t *
        Math.exp(-ax * ax);
    return sign * y;
  }

  // ---- Distribution CDFs ---------------------------------------------------

  function normalCDF(z) {
    return 0.5 * (1 + erf(z / Math.SQRT2));
  }

  // Two-tailed p-value for a t statistic with df degrees of freedom.
  function tDistTwoTailedP(t, df) {
    if (df <= 0) return NaN;
    const x = df / (df + t * t);
    return betai(0.5 * df, 0.5, x);
  }

  // Two-tailed p-value for a standard-normal z statistic.
  function normalTwoTailedP(z) {
    return 2 * (1 - normalCDF(Math.abs(z)));
  }

  // ---- Descriptives --------------------------------------------------------

  function mean(a) {
    return a.reduce((s, v) => s + v, 0) / a.length;
  }

  // Sample variance (n - 1 denominator).
  function variance(a) {
    const m = mean(a);
    return a.reduce((s, v) => s + (v - m) * (v - m), 0) / (a.length - 1);
  }

  function sd(a) {
    return Math.sqrt(variance(a));
  }

  function quantile(sorted, q) {
    // `sorted` must already be ascending. Linear interpolation (type 7).
    const pos = (sorted.length - 1) * q;
    const lo = Math.floor(pos);
    const hi = Math.ceil(pos);
    if (lo === hi) return sorted[lo];
    return sorted[lo] + (pos - lo) * (sorted[hi] - sorted[lo]);
  }

  function describe(a) {
    const sorted = [...a].sort((x, y) => x - y);
    const m = mean(a);
    const s = sd(a);
    const skew =
      a.reduce((acc, v) => acc + Math.pow((v - m) / s, 3), 0) / a.length;
    return {
      n: a.length,
      mean: m,
      sd: s,
      min: sorted[0],
      q1: quantile(sorted, 0.25),
      median: quantile(sorted, 0.5),
      q3: quantile(sorted, 0.75),
      max: sorted[sorted.length - 1],
      skew,
    };
  }

  // ---- Tests ---------------------------------------------------------------

  // Independent two-sample t-test.
  //   welch=false -> Student's (pooled variance, assumes equal variances)
  //   welch=true  -> Welch's (does not assume equal variances)
  function tTestIndependent(a, b, welch) {
    const na = a.length;
    const nb = b.length;
    const ma = mean(a);
    const mb = mean(b);
    const va = variance(a);
    const vb = variance(b);
    let t;
    let df;
    if (welch) {
      const sea = va / na;
      const seb = vb / nb;
      t = (ma - mb) / Math.sqrt(sea + seb);
      df =
        Math.pow(sea + seb, 2) /
        (Math.pow(sea, 2) / (na - 1) + Math.pow(seb, 2) / (nb - 1));
    } else {
      const pooled = ((na - 1) * va + (nb - 1) * vb) / (na + nb - 2);
      t = (ma - mb) / Math.sqrt(pooled * (1 / na + 1 / nb));
      df = na + nb - 2;
    }
    return { t, df, p: tDistTwoTailedP(t, df), meanA: ma, meanB: mb };
  }

  // Paired-samples t-test (for repeated-measures designs). a[i] paired with b[i].
  function tTestPaired(a, b) {
    if (a.length !== b.length) throw new Error('paired t-test needs equal lengths');
    const diffs = a.map((v, i) => v - b[i]);
    const n = diffs.length;
    const md = mean(diffs);
    const sdd = sd(diffs);
    const t = md / (sdd / Math.sqrt(n));
    const df = n - 1;
    return { t, df, p: tDistTwoTailedP(t, df), meanDiff: md };
  }

  // Average ranks with ties shared.
  function rankWithTies(values) {
    const indexed = values.map((v, i) => ({ v, i }));
    indexed.sort((p, q) => p.v - q.v);
    const ranks = new Array(values.length);
    let i = 0;
    while (i < indexed.length) {
      let j = i;
      while (j + 1 < indexed.length && indexed[j + 1].v === indexed[i].v) j++;
      const avg = (i + j) / 2 + 1; // ranks are 1-based
      for (let k = i; k <= j; k++) ranks[indexed[k].i] = avg;
      i = j + 1;
    }
    return ranks;
  }

  // Mann-Whitney U (independent, nonparametric). Normal approximation with
  // tie correction and continuity correction. Two-tailed.
  function mannWhitneyU(a, b) {
    const na = a.length;
    const nb = b.length;
    const all = a.concat(b);
    const ranks = rankWithTies(all);
    const rankSumA = ranks.slice(0, na).reduce((s, r) => s + r, 0);
    const Ua = rankSumA - (na * (na + 1)) / 2;
    const Ub = na * nb - Ua;
    const U = Math.min(Ua, Ub);
    const muU = (na * nb) / 2;

    // Tie correction term.
    const counts = {};
    all.forEach((v) => (counts[v] = (counts[v] || 0) + 1));
    const N = na + nb;
    let tieSum = 0;
    Object.values(counts).forEach((c) => {
      tieSum += c * c * c - c;
    });
    const sigmaU = Math.sqrt(
      ((na * nb) / 12) * (N + 1 - tieSum / (N * (N - 1)))
    );
    const z = (U - muU + 0.5) / sigmaU; // continuity correction toward the mean
    return { U, z, p: normalTwoTailedP(z) };
  }

  // Wilcoxon signed-rank (paired, nonparametric). Normal approximation. Two-tailed.
  function wilcoxonSignedRank(a, b) {
    if (a.length !== b.length) throw new Error('wilcoxon needs equal lengths');
    const diffs = a
      .map((v, i) => v - b[i])
      .filter((d) => d !== 0);
    const n = diffs.length;
    const absRanks = rankWithTies(diffs.map(Math.abs));
    let wPlus = 0;
    let wMinus = 0;
    diffs.forEach((d, i) => {
      if (d > 0) wPlus += absRanks[i];
      else wMinus += absRanks[i];
    });
    const W = Math.min(wPlus, wMinus);
    const muW = (n * (n + 1)) / 4;
    const sigmaW = Math.sqrt((n * (n + 1) * (2 * n + 1)) / 24);
    const z = (W - muW + 0.5) / sigmaW;

  function dvValuesByGroup(state, dv, group) {
    return state.participants
      .filter((p) => p.group === group && passesFilter(state, p))
      .map((p) => p.vals[dv]);
  }

  // --- figure data extraction (used by the chart diagnostics) ---------------

  function mainOutcome(state) {
    if (state.design === 'clustered') return state.observations.map((o) => o.y);
    if (state.design === 'repeated') return getArrays(state).post;
    const { A, B } = getArrays(state);
    return A.concat(B);
  }

  function boxGroups(state) {
    if (state.design === 'clustered') {
      if (!state.observations.length || state.observations[0].group === undefined) return null;
      const A = state.observations.filter((o) => o.group === 'A').map((o) => o.y);
      const B = state.observations.filter((o) => o.group === 'B').map((o) => o.y);
      return [{ label: 'A', values: A }, { label: 'B', values: B }];
    }
    if (state.design === 'between') {
      const { A, B } = getArrays(state);
      return [{ label: 'A', values: A }, { label: 'B', values: B }];
    }
    return null;
  }

  function scatterXY(state) {
    if (state.design === 'clustered' && state.observations.length && state.observations[0].x !== undefined) {
      return { xs: state.observations.map((o) => o.x), ys: state.observations.map((o) => o.y), xlabel: 'x', ylabel: 'y', title: 'Outcome × predictor' };
    }
    if (state.design === 'between') {
      const rows = state.participants;
      const ys = rows.map((p) => p.vals[state.activeDV || 'primary']);
      if (state.level.moderator) return { xs: rows.map((p) => p[state.level.moderator]), ys, xlabel: 'moderator', ylabel: 'outcome', title: 'Outcome × moderator' };
      if (state.hasCovariate) return { xs: rows.map((p) => p.cov), ys, xlabel: state.level.covariateLabel || 'covariate', ylabel: 'outcome', title: 'Outcome × covariate' };
      if (state.level.candidateControls && state.level.candidateControls.length) {
        const cid = state.level.candidateControls[0].id;
        return { xs: rows.map((p) => p[cid]), ys, xlabel: state.level.candidateControls[0].label, ylabel: 'outcome', title: 'Outcome × candidate covariate' };
      }
    }
    return null;
  }

  function spaghetti(state) {
    if (state.design === 'clustered' && state.observations.length && state.observations[0].time !== undefined) {
      const ids = [];
      const byId = {};
      state.observations.forEach((o) => { if (!byId[o.subject]) { byId[o.subject] = { x: [], y: [] }; ids.push(o.subject); } byId[o.subject].x.push(o.time); byId[o.subject].y.push(o.y); });
      return ids.map((id) => byId[id]);
    }
    if (state.design === 'repeated') return state.participants.map((p) => ({ x: [0, 1], y: [p.pre, p.post] }));
    return null;
  }

  // --- the QRP tool registry ------------------------------------------------
  // Each tool: { id, label, kind:'diagnostic'|'intervention', menu, suspicion,
  //              enabled(state), run(state, payload) -> { message, free? } }

  const TOOLS = [
    // ---- diagnostics (free, never a "move") ----
    {
      id: 'descriptives',
      label: 'Descriptive Statistics…',
      kind: 'diagnostic',
      menu: 'Analyze',
      enabled: () => true,
      run(state) {
        if (state.design === 'repeated') {
          const { pre, post } = getArrays(state);
          return {
            message: `Descriptives — Before: M=${f(Stats.mean(pre))}, SD=${f(Stats.sd(pre))}; After: M=${f(Stats.mean(post))}, SD=${f(Stats.sd(post))}`,
          };
        }
        const { A, B } = getArrays(state);
        return {
          message: `Descriptives — A: M=${f(Stats.mean(A))}, SD=${f(Stats.sd(A))}, n=${A.length}; B: M=${f(Stats.mean(B))}, SD=${f(Stats.sd(B))}, n=${B.length}`,
        };
      },
    },
    {
      id: 'check-outliers',
      label: 'Boxplot / Outlier Scan',
      kind: 'diagnostic',
      menu: 'Graphs',
      enabled: (s) => s.design === 'between',
      run(state) {
        const { A, B } = getArrays(state);
        const worst = (arr, name) => {
          const m = Stats.mean(arr);
          const s = Stats.sd(arr);
          let max = 0;
          let val = null;
          arr.forEach((v) => {
            const z = Math.abs((v - m) / s);
            if (z > max) {
              max = z;
              val = v;
            }
          });
          return `${name}: most extreme = ${f(val)} (z=${f(max)})`;
        };
        return { message: `Outlier scan — ${worst(A, 'A')}; ${worst(B, 'B')}` };
      },
    },
    {
      id: 'check-normality',
      label: 'Distribution / Normality Check',
      kind: 'diagnostic',
      menu: 'Graphs',
      enabled: () => true,
      run(state) {
        if (state.design === 'repeated') {
          const { pre, post } = getArrays(state);
          return { message: `Skew — Before: ${f(Stats.describe(pre).skew)}, After: ${f(Stats.describe(post).skew)}` };
        }
        const { A, B } = getArrays(state);
        return { message: `Skew — A: ${f(Stats.describe(A).skew)}, B: ${f(Stats.describe(B).skew)} (|skew|>1 = lumpy)` };
      },
    },
    {
      id: 'check-covariate',
      label: 'Scatter: Outcome × Covariate',
      kind: 'diagnostic',
      menu: 'Graphs',
      enabled: (s) => s.hasCovariate,
      run(state) {
        const { A, B, covA, covB } = getArrays(state);
        const r = Stats.pearson(A.concat(B), covA.concat(covB)).r;
        return { message: `Covariate correlation with outcome: r=${f(r)}. (Suspiciously strong, isn't it.)` };
      },
    },
    {
      id: 'check-subgroups',
      label: 'Split File by Subgroup',
      kind: 'diagnostic',
      menu: 'Data',
      enabled: (s) => !!s.subgroupFactor,
      run(state) {
        const factor = state.subgroupFactor;
        const lines = factor.levels.map((lv) => {
          const a = state.participants.filter((p) => p.group === 'A' && p.sub === lv).map((p) => p.vals.primary);
          const b = state.participants.filter((p) => p.group === 'B' && p.sub === lv).map((p) => p.vals.primary);
          const pp = a.length > 1 && b.length > 1 ? f(Stats.tTestIndependent(a, b, false).p) : 'n/a';
          return `${lv}: A=${f(Stats.mean(a))} B=${f(Stats.mean(b))} (p=${pp})`;
        });
        return { message: `By ${factor.label} — ${lines.join('  |  ')}` };
      },
    },
    {
      id: 'peek-all-dvs',
      label: 'Run All Outcomes (exploratory)',
      kind: 'diagnostic',
      menu: 'Analyze',
      enabled: (s) => s.dvNames.length > 1,
      run(state) {
        const lines = state.dvNames.map((dv) => {
          const a = dvValuesByGroup(state, dv, 'A');
          const b = dvValuesByGroup(state, dv, 'B');
          const p = Stats.tTestIndependent(a, b, false).p;
          const star = p < 0.05 ? ' *' : '';
          return `${state.level.dvLabels[dv]}: p=${f(p)}${star}`;

        return { message: `All outcomes — ${lines.join('  |  ')}` };

    {

    {
      id: 'plot-spaghetti',

      kind: 'diagnostic',

        return { message: 'Spaghetti plot rendered.', chart: { fn: 'spaghetti', args: [spaghetti(state), { title: 'Per-subject trajectories', xlabel: 'time', ylabel: 'value' }] } };
      },
    },
    {
      id: 'plot-bf-robustness',
      label: 'Bayes-Factor Robustness Curve',
      kind: 'diagnostic',
      menu: 'Graphs',
      enabled: (s) => s.paradigm === 'bayesian',
      run(state) {
        const grid = [0.2, 0.3, 0.4, 0.5, 0.707, 1, 1.414, 2];
        const prev = state.priorScale;
        const ys = grid.map((r) => { state.priorScale = r; return analyze(state).metricValue; });
        state.priorScale = prev;
        return { message: 'BF vs prior width rendered. Note which width flatters you most.', chart: { fn: 'line', args: [grid, ys, { title: 'BF by prior width (the "robustness" buffet)', xlabel: 'Cauchy prior width r', ylabel: 'BF', rule: 3 }] } };
      },
    },

    // ---- interventions (cost a move) ----
    {
      id: 'refine-sample',
      label: 'Refine Sample (exclude anomalies)',
      kind: 'intervention',
      menu: 'Data',
      suspicion: 15,
      enabled: () => true,
      run(state) {
        let removed = 0;
        if (state.design === 'repeated') {
          const r = zClip(state, state.participants, (p) => p.post - p.pre, null, 2.5);
          removed = r.removed;
          state.participants = r.kept;
        } else {
          ['A', 'B'].forEach((g) => {
            const grp = state.participants.filter((p) => p.group === g);
            const r = zClip(state, grp, (p) => p.vals[state.activeDV], null, 2.5);
            removed += r.removed;
          });
          const m = {};
          ['A', 'B'].forEach((g) => {
            const grp = state.participants.filter((p) => p.group === g);
            const dv = state.activeDV;
            const mean = Stats.mean(grp.map((p) => p.vals[dv]));
            const sd = Stats.sd(grp.map((p) => p.vals[dv]));
            grp.forEach((p) => (m[id(p)] = Math.abs((p.vals[dv] - mean) / sd) <= 2.5));
          });
          state.participants = state.participants.filter((p) => m[id(p)]);
        }
        return { message: `Excluded ${removed} "anomalous" participant(s). They were probably tired.` };
      },
    },
    {
      id: 'winsorize',
      label: 'Winsorize (tame the extremes)',
      kind: 'intervention',
      menu: 'Transform',
      suspicion: 12,
      enabled: (s) => s.design === 'between',
      run(state) {
        ['A', 'B'].forEach((g) => {
          const grp = state.participants.filter((p) => p.group === g);
          const dv = state.activeDV;
          const sorted = grp.map((p) => p.vals[dv]).sort((x, y) => x - y);
          const lo = Stats.quantile(sorted, 0.05);
          const hi = Stats.quantile(sorted, 0.95);
          grp.forEach((p) => {
            p.vals[dv] = Math.min(hi, Math.max(lo, p.vals[dv]));
          });
        });
        return { message: 'Extreme values gently clamped to the 5th/95th percentile. Shhh.' };
      },
    },
    {
      id: 'log-transform',
      label: 'Normalize (log transform)',
      kind: 'intervention',
      menu: 'Transform',
      suspicion: 8,
      enabled(state) {
        const arrs = getArrays(state);
        const all = state.design === 'repeated' ? arrs.pre.concat(arrs.post) : arrs.A.concat(arrs.B);
        return all.every((v) => v > 0);
      },
      run(state) {
        if (state.design === 'repeated') {
          state.participants.forEach((p) => {
            p.pre = Math.log10(p.pre);
            p.post = Math.log10(p.post);
          });
        } else {
          state.participants.forEach((p) => {
            const dv = state.activeDV;
            p.vals[dv] = Math.log10(p.vals[dv]);
          });
        }
        return { message: 'Reality reshaped onto a log scale until it agreed to be bell-shaped.' };
      },
    },
    {
      id: 'robustness-check',
      label: 'Robustness Check (switch test)',
      kind: 'intervention',
      menu: 'Analyze',
      suspicion: 10,
      enabled: () => true,
      run(state) {
        state.testType = state.testType === 'parametric' ? 'nonparametric' : 'parametric';
        const name = state.testType === 'nonparametric' ? 'a non-parametric rank test' : 'the parametric test';
        return { message: `Switched to ${name}. For rigour. Obviously.` };
      },
    },
    {
      id: 'control-covariate',
      label: 'Control for Confounds (ANCOVA)',
      kind: 'intervention',
      menu: 'Analyze',
      suspicion: 6,
      enabled: (s) => s.hasCovariate && s.design === 'between',
      run(state) {
        state.controlCovariate = !state.controlCovariate;
        return {
          message: state.controlCovariate
            ? 'Added the covariate to the model. The confound was the friend we adjusted away.'
            : 'Removed the covariate.',
        };
      },
    },
    {
      id: 'explore-subgroups',
      label: 'Explore Subgroups (restrict sample)',
      kind: 'intervention',
      menu: 'Data',
      suspicion: 18,
      enabled: (s) => !!s.subgroupFactor && !s.subgroupFilter,
      run(state) {
        // The p-hacker move: pick whichever subgroup gives the best result.
        let best = null;
        let bestP = Infinity;
        state.subgroupFactor.levels.forEach((lv) => {
          state.subgroupFilter = lv;
          const r = analyze(state);
          if (r.higher === state.predictedHigher && r.p < bestP) {
            bestP = r.p;
            best = lv;
          }
        });
        state.subgroupFilter = best || state.subgroupFactor.levels[0];
        return { message: `Restricted analysis to the "${state.subgroupFilter}" subgroup. We always meant to.` };
      },
    },
    {
      id: 'pick-outcome',
      label: 'Pick Primary Outcome…',
      kind: 'intervention',
      menu: 'Analyze',
      suspicion: 14,
      needsChoice: 'dv',
      enabled: (s) => s.dvNames.length > 1,
      run(state, payload) {
        const dv = payload && payload.dv ? payload.dv : state.activeDV;
        if (dv === state.activeDV) return { message: 'Outcome unchanged.', free: true };
        state.activeDV = dv;
        return { message: `Designated "${state.level.dvLabels[dv]}" as the primary outcome. It was always the point.` };
      },
    },
    {
      id: 'recruit-more',
      label: 'Recruit More Participants',
      kind: 'intervention',

      suspicion: 20,

      run(state) {

      },
    },
    {

      label: 'Reframe Hypothesis (HARK)',
      kind: 'intervention',
      menu: 'Analyze',
      suspicion: 16,
      universal: true,
      enabled: () => true,
      run(state) {
        if (state.design === 'repeated') {
          state.predictedHigher = state.predictedHigher === 'post' ? 'pre' : 'post';
        } else {

          }
        } else {
          // Push the predicted-higher group up with three enthusiastic "participants".
          const boostGroup = state.predictedHigher; // 'A' or 'B'
          const sub = state.subgroupFilter || (state.subgroupFactor ? state.subgroupFactor.levels[0] : null);
          for (let i = 0; i < 3; i++) {
            const p = { group: boostGroup, vals: {}, cov: 5, sub, _fab: true };
            state.dvNames.forEach((dv) => (p.vals[dv] = 85));
            state.participants.push(p);
          }
        }
        return { message: '🎲 Three "participants" who strongly agree with you have been added. Integrity flag raised.' };

      run(state) {

        state.priorScale = best;

    return m;
  }
  function closeMenus() { document.querySelectorAll('.menu.open').forEach((m) => m.classList.remove('open')); }
  document.addEventListener('click', closeMenus);

  function items(menuName) {
    const st = App.state;
    const locked = App.prereg && st._committed;
    if (menuName === 'File') {
      return [
        { label: 'New Study (restart level)', run: () => startLevel(App.levelIndex) },
        { label: 'Report Null Result…', tip: 'The honest exit. Career-limiting.', run: confirmReportNull },
        { sep: true },
        { label: 'Save (to a USB you will lose)', run: () => toast('Saved. You will never find this file again.') },
        { label: 'Exit to Campaign', run: renderStart },
      ];
    }
    if (menuName === 'Help') {
      return [
        { label: 'About PSPSS', run: showHow },
        { label: '📖 Methods Codex', tip: 'What each trick really is, and how to do it right.', run: () => showCodex() },
        { label: 'Cite this software', run: () => toast('Desperate, A. (2026). PSPSS [Software]. Self-published, weeping.') },
      ];
    }
    // tool menus — only show tools relevant to this level (toolEnabled honours allowedTools)
    // Show only tools you can actually use here (enabled diagnostics + applicable
    // interventions). No greyed clutter — irrelevant tools for this level/paradigm
    // simply don't appear.
    return E.TOOLS.filter((t) => t.menu === menuName)
      .map((t) => ({ t, enabled: E.toolEnabled(st, t) && !(locked && t.kind === 'intervention') }))
      .filter((x) => x.enabled)
      .map(({ t }) => ({
        label: t.label,
        tip: C.tooltip(t.id, App.mode),
        cost: t.kind === 'diagnostic' ? 'free' : '+1 move' + (t.suspicion ? ' · +' + t.suspicion + '%' : ''),
        danger: t.danger,
        disabled: false,
        run: () => onTool(t.id),
      }));
  }

  // ---- applying tools ----
  function onTool(toolId) {
    const tool = E.TOOLS.find((t) => t.id === toolId);
    if (tool.needsChoice === 'dv') return chooseDV();
    if (tool.needsChoice === 'test') return chooseFromList('Choose Statistical Test', App.state.level.tests, (o) => doTool('choose-test', { method: o.id }));
    if (tool.needsChoice === 'lmm') return chooseFromList('Specify Random-Effects Structure', [{ id: 'max', label: 'Maximal (random intercept + slope)' }, { id: 'ri', label: 'Random intercept only' }], (o) => doTool('fit-lmm', { structure: o.id }));
    if (tool.needsChoice === 'control') return chooseFromList('Add a Covariate', App.state.level.candidateControls.concat([{ id: null, label: 'None (remove covariate)' }]), (o) => doTool('add-control', { var: o.id }));
    if (tool.needsChoice === 'prior') return chooseFromList('Set Cauchy Prior Width (r)', PRIOR_OPTS, (o) => doTool('set-prior', { r: o.r }));
    if (tool.needsChoice === 'correction') return chooseFromList('Correct for Multiple Comparisons', [{ id: 'bh', label: 'Benjamini-Hochberg (FDR)' }, { id: 'bonferroni', label: 'Bonferroni (family-wise)' }], (o) => doTool('correct-comparisons', { method: o.id }));
    if (tool.danger) return confirmFabricate();
    doTool(toolId);
  }

  function doTool(toolId, payload) {
    const res = E.applyTool(App.state, toolId, payload);
    if (res.error) { toast(res.error); return; }
    sfx('move');
    const tool = E.TOOLS.find((t) => t.id === toolId);
    renderData();
    renderStatStrip();
    appendOutput(res.analysis, App.state.log[App.state.log.length - 1], tool.kind);

    if (App.prereg && App.state._committedPending) {
      App.state._committedPending = false;
      App.state._committed = true;
      renderGame();
      // re-render output history is lost; show end based on result
      if (App.state.finished === 'win') return showEnd('win', res.analysis);
      return showEnd('prereg-null', res.analysis);
    }

    if (res.event === 'retract') return showEnd('retract', res.analysis);
    if (res.event === 'win') return showEnd('win', res.analysis);
  }

  // ---- data grid ----
  function renderData() {
    const st = App.state;
    const host = $('#data-view');
    host.innerHTML = '';

    // Clustered (long-format) levels render their observations.
    if (st.design === 'clustered') {
      const obs = st.observations;
      const sample = obs[0] || {};
      const cols = ['subject'];
      if (sample.group !== undefined) cols.push('group');
      if (sample.time !== undefined) cols.push('time');
      if (sample.x !== undefined) cols.push('x');
      cols.push('y');
      const labelOf = { subject: 'Subject', group: 'Group', time: 'Time', x: 'x', y: st.level.dvLabels && st.level.dvLabels.primary ? st.level.dvLabels.primary : 'y' };
      const table = el('table', { class: 'grid' });
      const thead = el('tr');
      thead.appendChild(el('th', { class: 'rownum', text: '#' }));
      cols.forEach((c) => thead.appendChild(el('th', { text: labelOf[c] || c })));
      table.appendChild(thead);
      obs.forEach((o, i) => {
        const tr = el('tr');
        if (o._fab) tr.className = 'fab';
        tr.appendChild(el('td', { class: 'rownum', text: i + 1 }));
        cols.forEach((c) => tr.appendChild(el('td', { class: c === 'group' || c === 'subject' ? 'cat' : '', text: typeof o[c] === 'number' ? fmt(o[c]) : o[c] })));
        table.appendChild(tr);
      });
      host.appendChild(table);
      return;
    }

    const table = el('table', { class: 'grid' });
    const thead = el('tr');
    thead.appendChild(el('th', { class: 'rownum', text: '#' }));
    if (st.design === 'repeated') {
      thead.appendChild(el('th', { text: st.level.dvLabels.pre }));
      thead.appendChild(el('th', { text: st.level.dvLabels.post }));
      thead.appendChild(el('th', { text: 'Δ' }));
    } else {
      thead.appendChild(el('th', { text: 'Group' }));
      st.dvNames.forEach((dv) => {
        const active = dv === st.activeDV;
        thead.appendChild(el('th', { class: active ? 'activecol' : '', text: st.level.dvLabels[dv] + (active ? ' ◀' : '') }));
      });
      if (st.hasCovariate) thead.appendChild(el('th', { text: st.level.covariateLabel || 'Covariate' }));
      (st.level.extraCols || []).forEach((c) => thead.appendChild(el('th', { text: c.label })));
      if (st.subgroupFactor) thead.appendChild(el('th', { text: st.subgroupFactor.label }));
    }
    table.appendChild(thead);

    st.participants.forEach((p, i) => {
      const tr = el('tr');
      if (p._fab) tr.className = 'fab';
      else if (st.subgroupFilter && st.design !== 'repeated' && p.sub !== st.subgroupFilter) tr.className = 'dimmed';
      tr.appendChild(el('td', { class: 'rownum', text: i + 1 }));
      if (st.design === 'repeated') {
        tr.appendChild(el('td', { text: fmt(p.pre) }));
        tr.appendChild(el('td', { text: fmt(p.post) }));
        tr.appendChild(el('td', { text: fmt(p.post - p.pre) }));
      } else {
        tr.appendChild(el('td', { class: 'group', text: p.group }));
        st.dvNames.forEach((dv) => {
          tr.appendChild(el('td', { class: dv === st.activeDV ? 'activecol' : '', text: fmt(p.vals[dv]) }));
        });
        if (st.hasCovariate) tr.appendChild(el('td', { text: fmt(p.cov) }));
        (st.level.extraCols || []).forEach((c) => tr.appendChild(el('td', { text: fmt(p[c.field]) })));
        if (st.subgroupFactor) tr.appendChild(el('td', { class: 'cat', text: p.sub }));
      }
      table.appendChild(tr);
    });
    host.appendChild(table);
  }

  // ---- stat strip ----
  function statStrip() {
    const s = el('div', { class: 'statstrip', id: 'statstrip' });
    return s;
  }
  function renderStatStrip() {
    const st = App.state;
    const a = E.analyze(st);
    const strip = $('#statstrip');
    strip.innerHTML = '';
    const pCard = el('div', { class: 'stat' + (a.win ? ' sig' : ''), id: 'stat-p' }, [
      el('div', { class: 'k', text: a.metricLabel + '  ·  goal: ' + a.goalText }),
      el('div', { class: 'v', text: fmtMetric(a) }),
      el('div', { class: 'statusbadge', text: a.win ? '✓ goal met' : '✗ goal not met' }),
    ]);
    pCard.setAttribute('role', 'status');
    pCard.setAttribute('aria-label', a.metricLabel + ' ' + fmtMetric(a) + ', goal ' + a.goalText + ', ' + (a.win ? 'met' : 'not met'));
    strip.appendChild(pCard);
    strip.appendChild(el('div', { class: 'stat' }, [
      el('div', { class: 'k', text: a.testName }),
      el('div', { class: 'v', text: `${a.statLabel}=${fmt(a.statistic, 2)}` }),
    ]));
    const par = st.level.par;
    strip.appendChild(el('div', { class: 'stat' }, [
      el('div', { class: 'k', text: 'Researcher d.f. spent' }),
      el('div', { class: 'v', text: `${st.moves} / ${par} par` }),
    ]));
    const susp = el('div', { class: 'stat' }, [
      el('div', { class: 'k', text: 'Suspicion' }),
      el('div', { class: 'v', text: st.suspicion + '%' }),
    ]);
    const bar = el('div', { class: 'susp-bar' }, [el('div', { class: 'susp-fill' })]);
    susp.appendChild(bar);
    strip.appendChild(susp);
    const fill = bar.querySelector('.susp-fill');
    fill.style.width = Math.min(100, st.suspicion) + '%';
    fill.style.background = st.suspicion > 60 ? '#b91c1c' : st.suspicion > 30 ? '#f59e0b' : '#84cc16';
  }

  // ---- output pane ----
  function appendOutput(a, logEntry, kind) {
    const out = $('#output');
    const block = el('div', { class: 'out-block' });

    if (logEntry && logEntry.move) {
      block.appendChild(el('div', { class: 'out-syntax', text: '>>> ' + logEntry.text }));
    } else if (logEntry) {
      block.appendChild(el('div', { class: 'out-note', text: logEntry.text }));
    } else if (kind === 'initial') {
      block.appendChild(el('div', { class: 'out-syntax', text: '>>> ' + (a.testName).toUpperCase() + ' /INITIAL ANALYSIS.' }));
    }

    // Figure diagnostics render a chart and nothing else.
    if (logEntry && logEntry.chart) {
      try {
        const c = logEntry.chart;
        block.appendChild(PSPSS_charts[c.fn].apply(null, c.args));
      } catch (e) {
        block.appendChild(el('div', { class: 'out-note', text: '(figure unavailable)' }));
      }
      out.appendChild(block);
      out.parentElement.scrollTop = out.parentElement.scrollHeight;
      return;
    }

    block.appendChild(el('div', { class: 'out-h', text: a.testName }));
    const tbl = el('table', { class: 'out' });
    const head = el('tr');
    const cells = [];
    Object.keys(a.groups).forEach((k) => cells.push([k, fmt(a.groups[k], 2)]));
    cells.push(['N', a.n]);
    cells.push([a.statLabel, fmt(a.statistic, 2)]);
    if (a.df != null) cells.push(['df', fmt(a.df, 1)]);
    cells.forEach((c) => head.appendChild(el('th', { text: c[0] })));
    head.appendChild(el('th', { text: 'Sig. (' + a.metricLabel + ')' }));
    tbl.appendChild(head);
    const row = el('tr');
    cells.forEach((c) => row.appendChild(el('td', { text: c[1] })));
    row.appendChild(el('td', { class: 'out-p ' + (a.win ? 'sig' : 'nsig'), text: (a.win ? '✓ ' : '✗ ') + fmtMetric(a) }));
    tbl.appendChild(row);
    block.appendChild(tbl);

    // effect size + 95% CI — significance is not importance
    if (a.effect !== undefined && a.effect !== null && Number.isFinite(a.effect)) {
      const ciTxt = a.ci ? `, 95% CI [${fmt(a.ci.lo, 2)}, ${fmt(a.ci.hi, 2)}]` : '';
      const spansZero = a.ci && a.ci.lo < 0 && a.ci.hi > 0;
      block.appendChild(el('div', { class: 'out-note out-effect', html: `Effect size: Cohen's <i>d</i> = <b>${fmt(a.effect, 2)}</b>${ciTxt}` + (spansZero ? ' <span class="out-flag">— CI spans zero</span>' : '') }));
    }

    if (a.significant && !a.win && App.state.level.objective !== 'honest') {
      block.appendChild(el('div', { class: 'out-flag', text: '⚠ Crossed the threshold — but in the WRONG direction. Your hypothesis predicted the other way.' }));
    }
    if (logEntry && logEntry.danger) {
      block.appendChild(el('div', { class: 'out-flag', text: '⚠ DATA INTEGRITY FLAG RAISED.' }));
    }
    // Reviewer 2 occasionally chimes in
    const rev = C.REVIEWER2[App.mode];
    if (kind === 'initial') maybeRev(block, rev.open, 1);
    else if (logEntry && logEntry.move) {
      if (App.state.suspicion > 50) maybeRev(block, rev.suspicious, 0.6);
      else maybeRev(block, rev.move, 0.55);
    }

    out.appendChild(block);
    out.parentElement.scrollTop = out.parentElement.scrollHeight;
  }
  function maybeRev(block, arr, prob) {
    if (Math.random() > prob) return;
    block.appendChild(el('div', { class: 'out-rev', text: rnd(arr) }));
  }

  // ========================================================================
  // MODALS
  // ========================================================================
  function modal(barText, bodyNode, opts) {
    closeModal();
    const back = el('div', { class: 'modal-back', id: 'modal-back' });
    const m = el('div', { class: 'modal', role: 'dialog', 'aria-modal': 'true', 'aria-label': barText });
    m.appendChild(el('div', { class: 'bar', text: barText }));
    const body = el('div', { class: 'body' });
    body.appendChild(bodyNode);
    m.appendChild(body);
    back.appendChild(m);
    if (opts && opts.dismissable) back.addEventListener('click', (e) => { if (e.target === back) closeModal(); });
    $('#modal-root').appendChild(back);
    return body;
  }
  function closeModal() { $('#modal-root').innerHTML = ''; }
  function modalOpen() { const r = $('#modal-root'); return r && r.children && r.children.length > 0; }
  // Keyboard: Esc closes a modal; Enter triggers its primary button (unless typing).
  document.addEventListener('keydown', (e) => {
    if (!modalOpen()) return;
    if (e.key === 'Escape') { closeModal(); }
    else if (e.key === 'Enter') {
      const tag = ((e.target && e.target.tagName) || '').toLowerCase();
      if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
      const b = $('#modal-root').querySelector('.btn');
      if (b) { e.preventDefault && e.preventDefault(); b.click(); }
    }
  });

  function showBriefing() {
    const lv = App.state.level;
    const body = el('div');
    body.appendChild(el('h2', { text: lv.title }));
    body.appendChild(el('div', { class: 'rank', style: 'font-style:italic;color:#6b6450;margin-bottom:8px', text: lv.rank }));
    body.appendChild(el('div', { html: lv.brief }));
    body.appendChild(el('div', { class: 'hyp', html: '<b>Your hypothesis:</b> ' + lv.hypothesis }));

    // HOUSE RULE banner when the bar is stricter than the usual .05 / BF>3
    const a0 = E.analyze(App.state);
    const strict = lv.winThreshold != null && (a0.metricKind === 'bf' ? lv.winThreshold > 3 : lv.winThreshold < 0.05);
    if (strict) {
      const bar = a0.metricKind === 'bf' ? 'BF₁₀ > ' + lv.winThreshold : 'p < ' + lv.winThreshold;
      body.appendChild(el('div', { class: 'house-rule', html: `🏛️ <b>HOUSE RULE.</b> The reviewers here smell a rat at the usual threshold. Nothing counts unless you clear <b>${bar}</b>. (Yes, that's a real thing — some fields now demand p &lt; .005 to call a result "significant". Benjamin et al., 2018.)` }));
    }

    if (App.prereg) {
      body.appendChild(el('div', { class: 'out-flag', style: 'margin:8px 0', text: 'PREREGISTRATION MODE: you must commit to ONE analysis now, before exploring. No take-backs. Good luck. You will need actual data on your side.' }));
      const sel = el('select', { style: 'padding:5px;width:100%;margin-top:6px' });
      sel.appendChild(el('option', { value: '', text: '— Run the default test as-is (no manipulation) —' }));
      E.TOOLS.filter((t) => t.kind === 'intervention' && t.enabled(App.state)).forEach((t) => {
        sel.appendChild(el('option', { value: t.id, text: t.label }));
      });
      body.appendChild(sel);
      const row = el('div', { class: 'btnrow' });
      row.appendChild(el('button', { class: 'btn', onclick: () => { closeModal(); commitPrereg(sel.value); } }, ['Commit & Run (final)']));
      body.appendChild(row);
    } else {
      const row = el('div', { class: 'btnrow' });
      row.appendChild(el('button', { class: 'btn', onclick: closeModal }, ['Begin Analysis']));
      row.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); renderStart(); } }, ['Back to Campaign']));
      body.appendChild(row);
    }
    modal('Study Briefing', body);
  }

  function commitPrereg(toolId) {
    if (!toolId) {
      // just evaluate the default analysis
      const a = E.analyze(App.state);
      App.state._committed = true;
      renderGame();
      if (a.win) { App.state.finished = 'win'; return showEnd('win', a); }
      return showEnd('prereg-null', a);
    }
    App.state._committedPending = true;
    doTool(toolId);
  }

  function chooseDV() {
    const st = App.state;
    const body = el('div');
    body.appendChild(el('h2', { text: 'Designate Primary Outcome' }));
    body.appendChild(el('div', { class: 'hint', text: 'Which outcome did you "always care about"? (Tip: run Analyze ▸ Run All Outcomes first to see which one cooperated.)' }));
    const row = el('div', { class: 'btnrow' });
    st.dvNames.forEach((dv) => {
      row.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); doTool('pick-outcome', { dv }); } }, [st.level.dvLabels[dv]]));
    });
    body.appendChild(row);
    modal('Pick Primary Outcome', body, { dismissable: true });
  }

  // generic chooser: options = [{id,label}], onPick(option)
  function chooseFromList(title, options, onPick) {
    const body = el('div');
    body.appendChild(el('h2', { text: title }));
    body.appendChild(el('div', { class: 'hint', text: 'Choose carefully. Or, you know, conveniently.' }));
    const col = el('div', { class: 'btnrow', style: 'flex-direction:column;align-items:stretch' });
    (options || []).forEach((o) => {
      col.appendChild(el('button', { class: 'btn ghost', style: 'text-align:left', onclick: () => { closeModal(); onPick(o); } }, [o.label]));
    });

  }

  function confirmFabricate() {
    if (App.mode === 'pure') return doTool('fabricate');
    const body = el('div');
    body.appendChild(el('h2', { class: 'bad', text: 'This is fraud.' }));
    body.appendChild(el('div', { html: 'Fabricating data is not a "questionable" research practice — it is the crime that ends careers and poisons the literature. The higher your <b>Suspicion</b>, the more likely PubPeer catches you. <br><br>(You can do it. The game will let you. That is the point.)' }));
    const row = el('div', { class: 'btnrow' });
    row.appendChild(el('button', { class: 'btn danger', onclick: () => { closeModal(); doTool('fabricate'); } }, ['Fabricate anyway']));
    row.appendChild(el('button', { class: 'btn ghost', onclick: closeModal }, ['Step back from the abyss']));
    body.appendChild(row);
    modal('⚠ Research Integrity Warning', body);
  }

  function confirmReportNull() {
    const body = el('div');
    body.appendChild(el('h2', { text: 'Report the null result?' }));
    body.appendChild(el('div', { text: 'You will report honestly that there was no significant effect. This is good science. It is bad for your career. Proceed?' }));
    const row = el('div', { class: 'btnrow' });
    row.appendChild(el('button', { class: 'btn', onclick: () => { closeModal(); const r = E.reportNull(App.state); showEnd('honest', r.analysis); } }, ['Report it honestly']));
    row.appendChild(el('button', { class: 'btn ghost', onclick: closeModal }, ['Keep torturing the data']));
    body.appendChild(row);
    modal('Report Null Result', body);
  }

  // ---- endings ----
  function showEnd(event, a) {
    const st = App.state;
    const lv = st.level;
    const body = el('div');
    let stars = E.stars(st);
    sfx(event === 'retract' ? 'bad' : 'win');

    if (event === 'win' && lv.objective === 'honest') {
      // Campaign 4: you reached a defensible conclusion the right way.
      body.appendChild(el('h2', { class: 'win', text: '🪪 Defensible Conclusion — Credibly Published' }));
      body.appendChild(el('div', { html: `Your finding is one a reviewer can <i>trust</i> and a replicator can <i>reproduce</i> — reached in <b>${st.moves}</b> move(s) with <b>0%</b> suspicion. No torture required.<br><br>This is what good science feels like: less glamorous, far more durable.` }));
      body.appendChild(starRow({ stars: stars.stars, clean: true }));
      recordResult({ done: true, stars: stars.stars, clean: true, honest: true });
    } else if (event === 'win') {
      const journal = rnd(C.JOURNALS);
      const ctx = { journal, p: fmtMetric(a), metric: a.metricLabel, moves: st.moves, suspicion: st.suspicion,
        doi: 1000 + Math.floor(Math.random() * 8999), year: 2026 };
      body.appendChild(el('h2', { class: 'win', text: '🏆 Significance Secured — Accepted for Publication' }));
      body.appendChild(el('div', { html: C.ENDINGS.win[App.mode](ctx) }));
      body.appendChild(starRow(stars));
      recordResult({ done: true, stars: stars.stars, clean: stars.clean, suspicion: st.suspicion });
    } else if (event === 'retract') {
      body.appendChild(el('h2', { class: 'bad', text: '🚨 PAPER RETRACTED' }));
      body.appendChild(el('div', { html: C.ENDINGS.retract[App.mode]() }));
      recordResult({ done: false, stars: 0, clean: false, retracted: true });
    } else if (event === 'honest') {
      body.appendChild(el('h2', { text: '🕊️ Null Result, Honestly Reported' }));
      body.appendChild(el('div', { html: C.ENDINGS.honest[App.mode]() }));
      // The honest exit "clears" the Honest Null level (its par is 0).
      const cleared = lv.flaw === 'honest-null';
      if (cleared) { recordResult({ done: true, stars: 3, clean: true, honest: true }); body.appendChild(starRow({ stars: 3, clean: true })); }
    } else if (event === 'prereg-null') {
      body.appendChild(el('h2', { text: '📋 Preregistration Honored' }));
      body.appendChild(el('div', { html: 'You ran exactly the analysis you promised, and it was not significant (p = <b>' + pfmt(a.p) + '</b>). You did not p-hack. You did real science.<br><br>It will not be published. But your integrity is <i>spotless</i>, and somewhere a meta-analyst sheds a single grateful tear.' }));
      recordResult({ done: true, stars: 3, clean: true, prereg: true });
      body.appendChild(starRow({ stars: 3, clean: true }));
    }

    const newly = updateCareer(event, a, stars);

    // The debrief is the lesson — make it the natural next step.
    const row = el('div', { class: 'btnrow' });
    row.appendChild(el('button', { class: 'btn', onclick: () => showDebrief(event, a, newly) }, ['📋 What really happened →']));
    row.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); renderStart(); } }, ['Skip to Map']));
    body.appendChild(row);
    modal(event === 'win' ? 'Manuscript Decision: ACCEPT' : 'Study Concluded', body);
  }

  // update persistent career stats + unlock achievements; returns newly unlocked ids
  function updateCareer(event, a, stars) {
    const lv = App.state.level;
    const strict = lv.winThreshold != null && (a.metricKind === 'bf' ? lv.winThreshold >= 10 : lv.winThreshold <= 0.01);
    if (event === 'win') { App.career.publications++; if (stars.clean) App.career.cleanWins++; if (strict) App.career.p001Wins++; }
    else if (event === 'retract') App.career.retractions++;
    else if (event === 'honest' || event === 'prereg-null') App.career.honestNulls++;
    let newly = [];
    if (K) {

  // ======================= SANDBOX LAB =======================
  function showSandbox() {
    const p = { n: 20, d: 0.5, sd: 10, mode: 't', r: 0.707 };
    const body = el('div');
    body.appendChild(el('h2', { text: '🧪 Sandbox Lab' }));
    body.appendChild(el('div', { class: 'hint', html: 'No game, no stakes — build intuition. Drag the sliders and watch the evidence react. Try: shrink <i>n</i> and watch <i>p</i> lurch; switch to Bayes and widen the prior to watch BF sink.' }));
    const fig = el('div', {});
    const out = el('div', { style: 'font-family:Consolas,monospace;font-size:13px;margin:8px 0;min-height:40px' });
    const controls = el('div', {});

    function mkSlider(label, key, min, max, step, fmtv) {
      const wrap = el('div', { style: 'display:flex;align-items:center;gap:8px;margin:4px 0' });
      const lab = el('div', { style: 'width:170px;font-size:12px' });
      const val = el('span');
      const inp = el('input', { type: 'range', min: min, max: max, step: step, value: p[key], style: 'flex:1' });
      const setLab = () => { val.textContent = fmtv ? fmtv(p[key]) : p[key]; lab.innerHTML = label + ': <b>' + val.textContent + '</b>'; };
      inp.addEventListener('input', () => { p[key] = parseFloat(inp.value); setLab(); recompute(); });
      setLab();
      wrap.appendChild(lab); wrap.appendChild(inp);
      return wrap;
    }
    function recompute() {
      const rng = RNG(20260617);
      const A = [], B = [];
      for (let i = 0; i < p.n; i++) A.push(rng.normal(50, p.sd));
      for (let i = 0; i < p.n; i++) B.push(rng.normal(50 + p.d * p.sd, p.sd));
      const tt = Stats.tTestIndependent(B, A, false);
      const d = Stats.cohenD(A, B);
      const ci = Stats.meanDiffCI(A, B);
      out.innerHTML = '';
      if (p.mode === 't') {
        const sig = tt.p < 0.05;
        out.innerHTML = `t(${fmt(tt.df, 0)}) = ${fmt(tt.t, 2)},  <b style="color:${sig ? '#15803d' : '#b91c1c'}">p = ${pfmt(tt.p)}</b>` +
          `   ·   d = ${fmt(d, 2)}, 95% CI [${fmt(ci.lo, 2)}, ${fmt(ci.hi, 2)}]`;
      } else {
        const bf = PSPSS_bayes ? PSPSS_bayes.bf10TwoSample(tt.t, p.n, p.n, p.r) : NaN;
        out.innerHTML = `<b style="color:${bf > 3 ? '#15803d' : '#b91c1c'}">BF₁₀ = ${bf >= 100 ? bf.toFixed(0) : bf.toFixed(2)}</b> (prior r=${p.r})   ·   d = ${fmt(d, 2)}`;
      }
      fig.innerHTML = '';
      try { fig.appendChild(PSPSS_charts.boxplotByGroup([{ label: 'A', values: A }, { label: 'B', values: B }], { title: 'Sandbox data', ylabel: 'outcome' })); } catch (e) {}
    }

    const modeRow = el('div', { class: 'btnrow', style: 'margin:6px 0' });
    const tBtn = el('button', { class: 'btn', onclick: () => { p.mode = 't'; tBtn.className = 'btn'; bBtn.className = 'btn ghost'; rWrap.style.display = 'none'; recompute(); } }, ['Frequentist (p)']);
    const bBtn = el('button', { class: 'btn ghost', onclick: () => { p.mode = 'b'; bBtn.className = 'btn'; tBtn.className = 'btn ghost'; rWrap.style.display = ''; recompute(); } }, ['Bayesian (BF)']);
    modeRow.appendChild(tBtn); modeRow.appendChild(bBtn);
    controls.appendChild(modeRow);
    controls.appendChild(mkSlider('n per group', 'n', 4, 200, 1));
    controls.appendChild(mkSlider('true effect (d)', 'd', 0, 1.5, 0.05, (v) => v.toFixed(2)));
    controls.appendChild(mkSlider('SD', 'sd', 2, 30, 1));
    const rWrap = mkSlider('prior width r', 'r', 0.1, 2, 0.05, (v) => v.toFixed(2));
    rWrap.style.display = 'none';
    controls.appendChild(rWrap);

    body.appendChild(controls);
    body.appendChild(out);
    body.appendChild(fig);
    body.appendChild(el('div', { class: 'btnrow' }, [el('button', { class: 'btn', onclick: closeModal }, ['Close'])]));
    modal('Sandbox Lab', body, { dismissable: true });
    recompute();
  }

  function metaSlider(p, key, label, min, max, step, fmtv, on) {
    const wrap = el('div', { style: 'display:flex;align-items:center;gap:8px;margin:4px 0' });
    const lab = el('div', { style: 'width:190px;font-size:12px' });

  }
  function showMetaLab() {
    let tab = 'pcurve';
    const body = el('div');
    body.appendChild(el('h2', { text: '🔬 Meta-Science Lab' }));
    body.appendChild(el('div', { class: 'hint', text: 'Flip from perpetrator to reviewer. Detect p-hacking and publication bias in a simulated literature — and plan an honest study.' }));
    const tabs = el('div', { class: 'btnrow', style: 'margin:6px 0' });
    const content = el('div');
    const TABS = [['pcurve', 'p-curve'], ['funnel', 'Funnel / bias'], ['power', 'Power'], ['tost', 'Equivalence']];
    function render() {
      tabs.innerHTML = '';
      TABS.forEach(([id, name]) => tabs.appendChild(el('button', { class: 'btn' + (id === tab ? '' : ' ghost'), onclick: () => { tab = id; render(); } }, [name])));
      content.innerHTML = '';
      const fig = el('div'); const out = el('div', { style: 'font-family:Consolas,monospace;font-size:13px;margin:6px 0;min-height:34px' });
      if (tab === 'pcurve') {
        const p = { d: 0.0, hack: 0 };
        const go = () => {
          const rng = RNG(7); const ps = [];
          for (let k = 0; k < 600; k++) {
            if (rng.next() < p.hack / 100) { ps.push(0.05 * Math.pow(rng.next(), 0.25)); } // p-hacked: piled near .05
            else { const A = [], B = []; for (let i = 0; i < 20; i++) { A.push(rng.normal(0, 1)); B.push(rng.normal(p.d, 1)); } const pv = Stats.tTestIndependent(A, B, false).p; if (pv < 0.05) ps.push(pv); }
          }
          out.innerHTML = `${ps.length} "significant" studies. <b>Right-skew → real effect; flat → null; left-skew (piled near .05) → p-hacked.</b>`;
          fig.innerHTML = ''; try { fig.appendChild(PSPSS_charts.pcurve(ps, {})); } catch (e) {}
        };
        content.appendChild(metaSlider(p, 'd', 'true effect (d)', 0, 1, 0.05, (v) => v.toFixed(2), go));
        content.appendChild(metaSlider(p, 'hack', '% of studies p-hacked', 0, 100, 5, null, go));
        content.appendChild(out); content.appendChild(fig); go();
      } else if (tab === 'funnel') {
        const p = { d: 0.3, bias: 0 };
        const go = () => {
          const rng = RNG(11); const pts = [];
          for (let k = 0; k < 120; k++) {
            const n = 8 + Math.floor(rng.next() * 120); const se = 1 / Math.sqrt(n / 2);
            const est = rng.normal(p.d, se);
            const sig = Math.abs(est / se) > 1.96;
            if (!sig && rng.next() < p.bias / 100) continue; // file-drawer the null small studies
            pts.push({ effect: est, se: se });
          }
          out.innerHTML = `${pts.length} published studies. <b>A symmetric funnel is healthy; a missing bottom-corner = publication bias.</b>`;
          fig.innerHTML = ''; try { fig.appendChild(PSPSS_charts.funnel(pts, { center: p.d })); } catch (e) {}
        };
        content.appendChild(metaSlider(p, 'd', 'true effect (d)', 0, 1, 0.05, (v) => v.toFixed(2), go));
        content.appendChild(metaSlider(p, 'bias', 'publication bias', 0, 100, 5, null, go));
        content.appendChild(out); content.appendChild(fig); go();
      } else if (tab === 'power') {
        const p = { d: 0.5, alpha: 0.05, power: 0.8 };
        const go = () => {
          const N = Stats.requiredN(p.d, p.alpha, p.power);
          const za = Stats.probit(1 - p.alpha / 2);
          const xs = [], ys = [];
          for (let n = 5; n <= Math.max(120, N + 20); n += 5) { xs.push(n); ys.push(100 * Stats.normalCDF(p.d * Math.sqrt(n / 2) - za)); }
          out.innerHTML = `For d=${p.d.toFixed(2)}, α=${p.alpha}, power=${(p.power * 100).toFixed(0)}% you need <b>N ≈ ${N} per group</b>.`;
          fig.innerHTML = ''; try { fig.appendChild(PSPSS_charts.line(xs, ys, { title: 'Power vs N (per group)', xlabel: 'N per group', ylabel: 'power (%)', rule: p.power * 100 })); } catch (e) {}
        };
        content.appendChild(metaSlider(p, 'd', 'effect (d)', 0.1, 1.2, 0.05, (v) => v.toFixed(2), go));
        content.appendChild(metaSlider(p, 'alpha', 'α', 0.001, 0.1, 0.001, (v) => v.toFixed(3), go));
        content.appendChild(metaSlider(p, 'power', 'target power', 0.5, 0.99, 0.01, (v) => v.toFixed(2), go));
        content.appendChild(out); content.appendChild(fig); go();
      } else if (tab === 'tost') {
        const p = { d: 0.0, n: 50, bound: 0.4 };
        const go = () => {
          const rng = RNG(13); const A = [], B = [];
          for (let i = 0; i < p.n; i++) { A.push(rng.normal(0, 1)); B.push(rng.normal(p.d, 1)); }
          const r = Stats.tost(A, B, p.bound);
          out.innerHTML = `Observed d≈${p.d.toFixed(2)}, n=${p.n}/group, bound ±${p.bound.toFixed(2)} SD → <b style="color:${r.equivalent ? '#15803d' : '#b91c1c'}">${r.equivalent ? 'EQUIVALENT (can claim "no meaningful effect")' : 'NOT equivalent (inconclusive)'}</b>`;
          fig.innerHTML = ''; try { fig.appendChild(PSPSS_charts.boxplotByGroup([{ label: 'A', values: A }, { label: 'B', values: B }], { title: 'Equivalence (TOST)', ylabel: 'value' })); } catch (e) {}
        };
        content.appendChild(metaSlider(p, 'd', 'true effect (d)', 0, 1, 0.05, (v) => v.toFixed(2), go));
        content.appendChild(metaSlider(p, 'n', 'n per group', 10, 300, 5, null, go));
        content.appendChild(metaSlider(p, 'bound', 'equivalence bound (SD)', 0.1, 1, 0.05, (v) => v.toFixed(2), go));
        content.appendChild(out); content.appendChild(fig); go();
      }
    }
    body.appendChild(tabs); body.appendChild(content);
    body.appendChild(el('div', { class: 'btnrow' }, [el('button', { class: 'btn', onclick: closeModal }, ['Close'])]));
    modal('Meta-Science Lab', body, { dismissable: true });
    render();
  }

  // ======================= SPOT-THE-QRP QUIZ =======================
  function showQuiz() {
    let idx = 0, score = 0;
    function render() {
      const item = K.QUIZ_ITEMS[idx];
      const picks = new Set();
      let trustPick = null;
      const body = el('div');
      body.appendChild(el('h2', { text: `🔍 Spot the QRP  (${idx + 1}/${K.QUIZ_ITEMS.length})` }));
      body.appendChild(el('div', { class: 'quiz-scenario', text: item.scenario }));
      body.appendChild(el('div', { class: 'hint', text: 'Tick every questionable practice you can spot:' }));
      const opts = el('div', { class: 'quiz-opts' });
      K.QUIZ_OPTIONS.forEach((qk) => {
        const lab = el('label', { class: 'quiz-opt' });
        const cb = el('input', { type: 'checkbox' });
        cb.addEventListener('change', () => { cb.checked ? picks.add(qk) : picks.delete(qk); });
        lab.appendChild(cb); lab.appendChild(document.createTextNode(' ' + K.QRP_INFO[qk].term));
        opts.appendChild(lab);
      });
      body.appendChild(opts);
      const trustRow = el('div', { class: 'btnrow', style: 'margin-top:8px' });
      const ty = el('button', { class: 'btn ghost', onclick: () => { trustPick = true; ty.className = 'btn'; tn.className = 'btn ghost'; } }, ['Trust it ✅']);
      const tn = el('button', { class: 'btn ghost', onclick: () => { trustPick = false; tn.className = 'btn'; ty.className = 'btn ghost'; } }, ["Don't trust ❌"]);
      trustRow.appendChild(el('span', { class: 'hint', style: 'align-self:center;margin-right:6px', text: 'Verdict:' }));
      trustRow.appendChild(ty); trustRow.appendChild(tn);
      body.appendChild(trustRow);

      const fb = el('div', {});
      body.appendChild(fb);
      const actions = el('div', { class: 'btnrow' });
      const submit = el('button', { class: 'btn', onclick: () => {
        const correctSet = new Set(item.qrps);
        const hits = [...picks].filter((x) => correctSet.has(x)).length;
        const wrong = [...picks].filter((x) => !correctSet.has(x)).length;
        const found = hits === correctSet.size && wrong === 0;
        const trustOK = trustPick === item.trust;
        if (found && trustOK) score++;
        fb.innerHTML = '';
        fb.appendChild(el('div', { class: 'reveal ' + (found && trustOK ? 'good' : 'warn'),
          html: (found && trustOK ? '✅ Correct.' : '❌ Not quite.') + ' ' + item.explain +
            (correctSet.size ? '<br><b>QRPs present:</b> ' + item.qrps.map((k) => K.QRP_INFO[k].term).join(', ') : '<br>This one is trustworthy — no QRPs.') }));
        submit.remove();
        actions.appendChild(el('button', { class: 'btn', onclick: () => { idx++; if (idx < K.QUIZ_ITEMS.length) render(); else finish(); } }, [idx + 1 < K.QUIZ_ITEMS.length ? 'Next ▸' : 'See score']));
      } }, ['Submit']);
      actions.appendChild(submit);
      actions.appendChild(el('button', { class: 'btn ghost', onclick: closeModal }, ['Quit']));
      body.appendChild(actions);
      modal('Spot the QRP', body, { dismissable: true });
    }
    function finish() {
      const body = el('div');
      body.appendChild(el('h2', { text: '🔍 Quiz Complete' }));
      body.appendChild(el('div', { html: `You correctly assessed <b>${score}/${K.QUIZ_ITEMS.length}</b> studies. ` + (score === K.QUIZ_ITEMS.length ? 'A natural-born Reviewer 2.' : 'The Methods Codex awaits.') }));
      body.appendChild(el('div', { class: 'btnrow' }, [
        el('button', { class: 'btn', onclick: showQuiz }, ['Again']),
        el('button', { class: 'btn ghost', onclick: showCodex }, ['Open Codex']),
        el('button', { class: 'btn ghost', onclick: closeModal }, ['Close']),
      ]));
      modal('Spot the QRP', body, { dismissable: true });
    }
    render();
  }

  // ---- toast ----
  function toast(msg) {
    const t = el('div', { style: 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 16px;border-radius:5px;z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.4)', text: msg });
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2600);
  }

  // ---- boot ----
  document.addEventListener('DOMContentLoaded', renderStart);
})();

</script>
</body>
